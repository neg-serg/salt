validation_cases:
  - id: cli-root-secret
    priority: high
    consumer_category: cli
    consumer_path: operator-shell
    secret_paths:
      - ssh-key
    stage:
      - baseline
      - cutover
      - rollback
    expected_result: Representative top-level secret resolves successfully and matches baseline plaintext.

  - id: cli-nested-secret
    priority: high
    consumer_category: cli
    consumer_path: operator-shell
    secret_paths:
      - email/gmail/app-password
      - api/proxypilot-local
    stage:
      - baseline
      - cutover
      - rollback
    expected_result: Representative nested secrets resolve successfully and match baseline plaintext.

  - id: chezmoi-secret-templates
    priority: high
    consumer_category: chezmoi_template
    consumer_path: dotfiles/dot_config
    secret_paths:
      - email/gmail/address
      - email/gmail/app-password
      - api/github-token
      - api/context7
    stage:
      - baseline
      - cutover
      - stabilization
    expected_result: Existing secret-backed templates can resolve required keys without path changes.

  - id: chezmoi-apply-current-session
    priority: high
    consumer_category: shell_script
    consumer_path: chezmoi apply --force --source /home/neg/src/salt/dotfiles
    secret_paths:
      - email/gmail/address
      - email/gmail/app-password
      - api/github-token
      - api/context7
    stage:
      - cutover
      - rollback
    expected_result: The first post-cutover or post-rollback chezmoi apply succeeds in the same user session with no secret-read failures.

  - id: salt-lastfm-consumer
    priority: medium
    consumer_category: salt_state
    consumer_path: states/mpd.sls
    secret_paths:
      - lastfm/username
      - lastfm/password
    stage:
      - baseline
      - cutover
    expected_result: Salt secret lookup for Last.fm values remains available after cutover.

  - id: salt-proxypilot-consumers
    priority: high
    consumer_category: salt_state
    consumer_path: states/opencode.sls, states/openclaw_agent.sls, states/telethon_bridge.sls
    secret_paths:
      - api/proxypilot-local
      - api/proxypilot-management
      - api/groq
      - api/openclaw-telegram
    stage:
      - baseline
      - cutover
      - stabilization
    expected_result: Salt-managed ProxyPilot and Telegram-related consumers keep resolving existing secret paths.

  - id: salt-apply-preflight
    priority: high
    consumer_category: shell_script
    consumer_path: scripts/salt-apply.sh
    secret_paths: []
    stage:
      - baseline
      - cutover
      - stabilization
    expected_result: Preflight assumptions about gopass availability remain valid after cutover.

  - id: special-entry-subset
    priority: medium
    consumer_category: cli
    consumer_path: operator-shell
    secret_paths: []
    stage:
      - baseline
      - cutover
      - rollback
    expected_result: A representative subset of attached files and unusual or non-password entries remains readable and structurally intact after cutover and rollback.

  - id: repo-validation
    priority: high
    consumer_category: repo_validation
    consumer_path: just validate
    secret_paths: []
    stage:
      - baseline
      - cutover
      - rollback
    expected_result: Repository validation continues to succeed for secret-consuming states and templates.

stabilization_window:
  duration_days: 7
  owner: single-maintainer-operator
  retirement_condition: no fallback to legacy path and no unresolved required-workflow failures
