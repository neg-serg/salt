version: 1
feature: sysusers-tmpfiles-adoption
description: >
  Maintainer-facing contract for declaring long-lived managed service identities
  and service-related filesystem resources in the repository.

implementation_anchor:
  inventory_file: states/data/managed_resources.yaml
  orchestrator_state: states/systemd_resources.sls
  sysusers_template: states/configs/managed-service-accounts.conf.j2
  tmpfiles_template: states/configs/managed-service-paths.conf.j2

managed_service_identity:
  required_fields:
    - service_name
    - account_name
    - group_name
    - home_or_state_root
    - shell_policy
  invariants:
    - account_name remains stable for existing deployed services unless a later migration explicitly expands scope
    - group_name aligns with the declared service identity policy
    - home_or_state_root refers to a long-lived managed resource, not one-shot scratch space

managed_path_rule:
  required_fields:
    - rule_name
    - service_name
    - path
    - path_type
    - lifecycle
    - owner
    - group
    - mode
    - recreation_trigger
  allowed_values:
    path_type:
      - directory
      - file
      - fifo
      - symlink
    lifecycle:
      - persistent
      - ephemeral
    recreation_trigger:
      - apply
      - boot
      - both
  invariants:
    - path belongs to long-lived managed service setup
    - ephemeral resources define a recreation trigger that restores availability after reboot or equivalent lifecycle reset
    - ownership aligns with a managed service identity or a documented root-owned exception
  symbolic_values:
    __CURRENT_USER__: resolve to the workstation user from host configuration for user-owned tmpfiles resources

verification_expectations:
  - representative migrated identities can be materialized from absence in one repository run
  - representative persistent paths can be recreated with correct ownership and mode
  - representative ephemeral paths can be restored before dependent services use them
  - repeated repository applies stay failure-free on already compliant machines
