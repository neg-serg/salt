contract: verification-matrix
feature: 077-zen-browser-cutover
description: Minimum verification coverage required to accept the Zen Browser cutover on the target host.

checks:
  - id: render_gate
    domain: render
    description: Repository render validation succeeds before runtime testing
    method: run_just_default
    expected_result: pass

  - id: host_binding
    domain: profile
    description: Target host binds the managed Zen profile and no longer relies on Floorp as the supported path
    method: inspect_host_browser_fields
    expected_result: pass

  - id: zen_profile_files
    domain: profile
    description: Managed Zen profile files and extension payload are present after apply
    method: inspect_profile_contents
    expected_result: pass

  - id: helper_service_health
    domain: service
    description: Surfingkeys helper service is enabled and active in the user session
    method: inspect_user_service_state
    expected_result: pass

  - id: hypr_launch_surface
    domain: launch
    description: Hyprland browser binding opens or raises Zen Browser
    method: trigger_browser_launcher
    expected_result: pass

  - id: wayfire_launch_surface
    domain: launch
    description: Wayfire browser binding opens or raises Zen Browser
    method: inspect_and_trigger_browser_launcher
    expected_result: pass

  - id: wlr_which_key_surface
    domain: launch
    description: wlr-which-key browser entry opens or raises Zen Browser
    method: inspect_and_trigger_browser_launcher
    expected_result: pass

  - id: floorp_secondary_paths
    domain: launch
    description: Explicit secondary launch paths for Floorp remain present without replacing Zen Browser as the default browser target
    method: inspect_secondary_browser_launchers
    expected_result: pass

  - id: surfingkeys_extension
    domain: profile
    description: Surfingkeys is available inside Zen Browser on the managed profile
    method: runtime_browser_check
    expected_result: pass

  - id: helper_focus_action
    domain: runtime_action
    description: Helper-assisted address-bar focus action succeeds in Zen Browser
    method: trigger_surfingkeys_focus_action
    expected_result: pass

  - id: helper_new_tab_action
    domain: runtime_action
    description: Helper-assisted new-tab action succeeds in Zen Browser
    method: trigger_surfingkeys_new_tab_action
    expected_result: pass

failure_domains:
  - render
  - launch
  - profile
  - service
  - runtime_action

acceptance_rule: All checks must pass in one verification session for cutover acceptance, with helper-assisted workflow parity required only for Zen Browser.
