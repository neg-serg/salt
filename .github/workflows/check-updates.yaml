name: Check tool updates

on:
  schedule:
    - cron: '0 9 * * 1'  # Monday 09:00 UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Check for updates
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          body=$(python3 scripts/update-tools.py --check --ci)
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          {
            echo 'body<<BODY_EOF'
            echo "$body"
            echo 'BODY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create or update issue
        if: steps.check.outputs.rc == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title="[tools] version updates available"
          existing=$(gh issue list --state open --search "$title" --json number --jq '.[0].number')
          body="${{ steps.check.outputs.body }}"
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --body "$body"
          else
            gh issue create --title "$title" --body "$body"
          fi

      - name: Close issue if up to date
        if: steps.check.outputs.rc == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title="[tools] version updates available"
          existing=$(gh issue list --state open --search "$title" --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue close "$existing" --comment "All pinned versions are up to date."
          fi
