name: Salt & Scripts CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      MOCK_GOPASS_SECRETS: "api/proxypilot-local=ci-proxypilot-key,api/proxypilot-management=ci-management-key"
    steps:
      - uses: actions/checkout@v4

      - name: Enable mock gopass
        run: echo "$PWD/scripts/mock-bin" >> "$GITHUB_PATH"

      - name: Prepare Salt CI environment
        run: |
          # Create user 'neg' so runas= in Jinja rendering works
          sudo useradd -m neg 2>/dev/null || true
          # Create empty package list for file.search guards
          sudo mkdir -p /var/cache/salt
          sudo touch /var/cache/salt/pacman_installed.txt
          # Create /etc/salt for minion_id caching
          sudo mkdir -p /etc/salt

      - name: Install apt dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yqq \
            python3 python3-venv python3-pip \
            build-essential pkg-config libssl-dev libffi-dev \
            ripgrep fd-find shellcheck yamllint cargo zsh podman
          sudo ln -sf $(command -v fdfind) /usr/local/bin/fd

      - name: Install cargo tools
        run: |
          cargo install just taplo-cli
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Bootstrap Python venv
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Run just lint
        run: just lint

      - name: Run just validate
        run: just validate

      - name: Run just test (system_description)
        continue-on-error: true
        env:
          SALT_LOG_FILE: /tmp/salt-ci.log
        run: just test

      - name: Run just render-matrix
        run: just render-matrix

      - name: Run just smoke-test
        run: just smoke-test
