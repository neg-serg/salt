[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["dotfiles"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = []

[tool.ruff.lint.per-file-ignores]
# salt_compat must be imported and patched before any salt imports
"scripts/salt-daemon.py" = ["E402"]
"scripts/salt-runner.py" = ["E402"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
