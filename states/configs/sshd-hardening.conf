# Salt-managed SSH hardening (drop-in for /etc/ssh/sshd_config.d/)
# Loaded BEFORE the main sshd_config — first match wins.

# Authentication: keys only, no passwords
PasswordAuthentication no
KbdInteractiveAuthentication no
PermitRootLogin no
MaxAuthTries 3
PubkeyAuthentication yes

# Session safety
ClientAliveInterval 300
ClientAliveCountMax 2
LoginGraceTime 30
MaxSessions 5

# Disable unused features
X11Forwarding no
PermitTunnel no
