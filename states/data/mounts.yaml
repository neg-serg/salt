# Disk mounts and btrfs compression targets
# Used by mounts.sls
#
# ── Schema ────────────────────────────────────────────────────────────
#
# disks:
#   <name>:
#     device: (required) block device path (e.g. /dev/mapper/xenon-one)
#     path:   (required) mount point (e.g. /mnt/one)
#     fstype: (required) filesystem type (xfs, btrfs, etc.)
#     — mounted with options: noatime, persist: True, failhard: True
#
# btrfs_compress:
#   - <path>                       — filesystem path to set zstd:-1 compression on
#
# ─────────────────────────────────────────────────────────────────────

disks:
  zero:
    device: /dev/mapper/argon-zero
    path: /mnt/zero
    fstype: xfs
  one:
    device: /dev/mapper/xenon-one
    path: /mnt/one
    fstype: xfs

btrfs_compress:
  - /home
  - /var

# btrfs nocow: disable copy-on-write for high-churn directories.
# Reduces fragmentation and write amplification for caches, databases, containers.
# chattr +C only affects new files in existing dirs; existing files keep CoW.
btrfs_nocow:
  - /var/lib/bitcoind
  - /var/lib/containers
  - /var/lib/jellyfin
  - /var/log
