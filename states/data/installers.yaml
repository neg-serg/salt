# Tool definitions for installers.sls — data separated from logic.
# Adding/updating a tool is a YAML-only edit; no Jinja changes needed.
# Grouped by macro type (maps 1:1 to _macros.jinja macro signatures).
# URLs with ${VER} are interpolated at render time from data/versions.yaml.

curl_bin:
  ssh-to-age: "https://github.com/Mic92/ssh-to-age/releases/download/${VER}/ssh-to-age-linux-amd64"
  rofi-systemd: "https://raw.githubusercontent.com/IvanMalison/rofi-systemd/master/rofi-systemd"

github_tar:
  tdl: "https://github.com/iyear/tdl/releases/download/v${VER}/tdl_Linux_64bit.tar.gz"

pip_pkg:
  httpstat: {}
  scdl: {}
  faker: {}

cargo_pkg:
  rustnet:
    git: "https://github.com/domcyrus/rustnet"
  pzip:
    bin: pz
  rsmetrx:
    git: "https://github.com/neg-serg/rsmetrx"

curl_extract_zip:
  xray:
    url: "https://github.com/XTLS/Xray-core/releases/download/v${VER}/Xray-linux-64.zip"
    binary_path: xray
    chmod: true

curl_extract_tar:
  essentia:
    url: "https://data.metabrainz.org/pub/musicbrainz/acousticbrainz/extractors/essentia-extractor-v${VER}-linux-x86_64.tar.gz"
    binary_pattern: streaming_extractor_music
    bin: essentia_streaming_extractor_music
