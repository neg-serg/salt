# Kernel boot parameters for CachyOS (Limine bootloader).
# Grouped by condition; kernel_params_limine.sls assembles the final list.
#
# ── Schema ────────────────────────────────────────────────────────────
#
# common:                          — always included
#   - <param>
# amd:                             — included if host.cpu_vendor == 'amd'
#   - <param>
# intel:                           — included if host.cpu_vendor == 'intel'
#   - <param>
# laptop:                          — included if host.is_laptop
#   - <param>
# desktop:                         — included if not host.is_laptop
#   - <param>
#
# Each param is a kernel cmdline token (e.g. "key=value" or bare flag).
# host.extra_kargs and host.display are appended by the .sls at render time.
#
# ─────────────────────────────────────────────────────────────────────

common:
  - 8250.nr_uarts=0
  - nvme_core.default_ps_max_latency_us=0
  - lru_gen=1
  - lru_gen.min_ttl_ms=1000
  - transparent_hugepage=madvise
  - page_alloc.shuffle=1
  - slab_nomerge
  - init_on_alloc=1
  - randomize_kstack_offset=on
  - vsyscall=none
  - debugfs=off
  - vt.global_cursor_default=0
  - noreplace-smp
  - pcie_aspm=performance
  - rcupdate.rcu_expedited=1
  - tsc=reliable
  - split_lock_detect=off
  - nowatchdog
  - kernel.nmi_watchdog=0
  - idle=nomwait
  - usbcore.autosuspend=-1

amd:
  - amd_pstate=active
  - amdgpu.ppfeaturemask=0xffffffff

intel:
  - intel_pstate=active

laptop:
  - mem_sleep_default=deep

desktop:
  - "acpi_osi=!"
  - acpi_osi=Linux
