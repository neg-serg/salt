# Desktop environment configuration (consumed by desktop.sls)
#
# ── Schema ────────────────────────────────────────────────────────────
#
# hyprland_packages:
#   - <package>                    — pacman packages for Hyprland (one per line, inline comment)
# screenshot_packages:
#   - <package>                    — pacman packages for screenshots (one per line, inline comment)
#
# running_services:
#   - <service_name>               — systemd services to start and enable
#
# dconf_settings:
#   <dconf_path>: <value>          — key: full dconf path, value: setting value
#                                    values are shell-escaped at render time
#
# ─────────────────────────────────────────────────────────────────────

hyprland_packages:
  - hypridle                            # idle daemon for Hyprland
  - hyprlock                            # screen locker for Hyprland
  - hyprpicker                          # color picker for Hyprland
  - hyprpolkitagent                     # polkit authentication agent
  - wlr-randr                           # wlroots display configuration tool
  - xdg-desktop-portal-hyprland         # XDG desktop portal backend for Hyprland

screenshot_packages:
  - grim                                # Wayland screenshot tool
  - slurp                               # Wayland region selector

running_services:
  - NetworkManager
  - dbus-broker
  - openrgb
  - bluetooth
  - sshd
  - systemd-timesyncd

dconf_settings:
  /org/gnome/desktop/interface/gtk-theme: Flight-Dark-GTK
  /org/gnome/desktop/interface/icon-theme: kora
  /org/gnome/desktop/interface/font-name: "Iosevka 10"
