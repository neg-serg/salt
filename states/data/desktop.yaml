# Desktop environment configuration (consumed by desktop.sls)
#
# ── Schema ────────────────────────────────────────────────────────────
#
# hyprland_packages: <string>     — space-separated pacman packages for Hyprland
# screenshot_packages: <string>   — space-separated pacman packages for screenshots
#
# running_services:
#   - <service_name>               — systemd services to start and enable
#
# dconf_settings:
#   <dconf_path>: <value>          — key: full dconf path, value: setting value
#                                    values are shell-escaped at render time
#
# ─────────────────────────────────────────────────────────────────────

hyprland_packages: >-
  hyprpaper hypridle hyprlock hyprpolkitagent
  xdg-desktop-portal-hyprland hyprpicker wlr-randr

screenshot_packages: >-
  grim slurp

running_services:
  - NetworkManager
  - dbus-broker
  - openrgb
  - bluetooth
  - systemd-timesyncd

dconf_settings:
  /org/gnome/desktop/interface/gtk-theme: Flight-Dark-GTK
  /org/gnome/desktop/interface/icon-theme: kora
  /org/gnome/desktop/interface/font-name: "Iosevka 10"
