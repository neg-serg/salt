# Bootstrap verification data for cachyos.sls
# Entries with ${USER} are interpolated at render time from host_config.
# Adding/updating a check is a YAML-only edit; no Jinja changes needed.
#
# ── Schema ────────────────────────────────────────────────────────────
#
# required_files:
#   <id>: <path>                   — file.exists check; path may contain
#                                    ${USER} (interpolated from host_config)
#
# verify_checks:
#   <id>: <shell_command>          — cmd.run with unless: guard
#                                    placeholders: ${USER}, ${TIMEZONE},
#                                    ${LOCALE}, ${HOSTNAME}
#
# enabled_services:
#   <id>: <service_name>           — service.enabled check
#
# package_checks:
#   pkg:                           — official repo packages (checked via pacman -Q)
#     - <package_name>
#   aur:                           — AUR packages
#     - <package_name>
#   custom:                        — locally-built packages
#     - <package_name>
#
# ─────────────────────────────────────────────────────────────────────

required_files:
  sudo_nopasswd: "/etc/sudoers.d/99-${USER}-nopasswd"
  vconsole: /etc/vconsole.conf
  limine_conf: /boot/limine.conf
  limine_efi: /boot/EFI/BOOT/BOOTX64.EFI
  snapper_config: /etc/snapper/configs/root
  mirrorlist_v4: /etc/pacman.d/cachyos-v4-mirrorlist
  mirrorlist: /etc/pacman.d/cachyos-mirrorlist
  nm_iwd_backend: /etc/NetworkManager/conf.d/wifi-iwd.conf

verify_checks:
  sudo_nopasswd_content: "rg -q '${USER} ALL=\\(ALL\\) NOPASSWD: ALL' /etc/sudoers.d/99-${USER}-nopasswd"
  wheel_sudoers: "rg -q '^%wheel ALL=\\(ALL:ALL\\) ALL' /etc/sudoers"
  timezone: "readlink /etc/localtime | rg -q ${TIMEZONE}"
  locale: "rg -q '^LANG=${LOCALE}' /etc/locale.conf"
  hostname: "rg -q '^${HOSTNAME}' /etc/hostname"
  hosts: "rg -q '${HOSTNAME}' /etc/hosts"
  limine_conf_content: "rg -q 'vmlinuz-linux-cachyos-lts' /boot/limine.conf"
  snapper_registered: "rg -q 'root' /etc/conf.d/snapper 2>/dev/null"
  mkinitcpio_lvm2_hook: "rg -q 'lvm2' /etc/mkinitcpio.conf"
  mkinitcpio_zstd: "rg -q '^COMPRESSION=\"zstd\"' /etc/mkinitcpio.conf"
  initramfs_exists: "test -f /boot/initramfs-linux-cachyos-lts.img"
  pacman_v4_arch: "rg -q 'x86_64_v4' /etc/pacman.conf"
  repo_znver4: "rg -q '^\\[cachyos-znver4\\]' /etc/pacman.conf"
  repo_core_znver4: "rg -q '^\\[cachyos-core-znver4\\]' /etc/pacman.conf"
  repo_extra_znver4: "rg -q '^\\[cachyos-extra-znver4\\]' /etc/pacman.conf"
  repo_cachyos: "rg -q '^\\[cachyos\\]' /etc/pacman.conf"
  nm_iwd_backend_content: "rg -q 'wifi.backend=iwd' /etc/NetworkManager/conf.d/wifi-iwd.conf"
  resolv_conf: "test -s /etc/resolv.conf"
  zsh_neg: "getent passwd ${USER} | cut -d: -f7 | rg -q 'zsh$'"
  zsh_root: "getent passwd root | cut -d: -f7 | rg -q 'zsh$'"

enabled_services:
  networkmanager: NetworkManager
  iwd: iwd
  sshd: sshd
  snapper_timeline: snapper-timeline.timer
  snapper_cleanup: snapper-cleanup.timer

package_checks:
  pkg:
    # -- base system --
    - base                            # minimal Arch Linux installation
    - btrfs-progs                     # btrfs filesystem utilities
    - limine                          # multiprotocol bootloader
    - linux-cachyos-lts               # CachyOS LTS kernel
    - linux-firmware                  # firmware files for Linux
    - networkmanager                  # network connection manager
    - openssh                         # SSH server and client
    - paru                            # AUR helper
    - snap-pac                        # pacman hook for snapper snapshots
    - snapper                         # btrfs snapshot manager
    - sudo                            # privilege escalation
    - zsh                             # Z shell
    # -- desktop --
    - dunst                           # notification daemon
    - ghostty                         # GPU-accelerated terminal (Zig)
    - hyprland                        # Wayland tiling compositor
    - kitty                           # GPU-accelerated terminal
    - quickshell-git                  # Qt6 desktop shell framework (AUR, built from source)
    - rofi                            # application launcher
    - swappy                          # screenshot annotation tool
    - swayosd                         # on-screen display for Wayland
    - wl-clip-persist                 # Wayland clipboard persistence
    # -- dev tools --
    - chezmoi                         # dotfile manager
    - clang                           # C/C++ compiler (LLVM)
    - cmake                           # build system generator
    - git                             # version control system
    - git-delta                       # syntax-highlighting diff pager
    - nodejs                          # JavaScript runtime
    - rust                            # Rust toolchain
    # -- cli tools --
    - bat                             # cat with syntax highlighting
    - btop                            # resource monitor
    - fastfetch                       # system information tool
    - fd                              # find alternative
    - fzf                             # fuzzy finder
    - gopass                          # password manager (GPG)
    - imagemagick                     # image manipulation toolkit
    - ripgrep                         # fast recursive grep
    - socat                           # multipurpose relay tool
    - tmux                            # terminal multiplexer
    - yt-dlp                          # media downloader
    - zoxide                          # smart cd replacement
    # -- media --
    - ffmpegthumbnailer               # video thumbnail generator
    - mpd                             # music player daemon
    - mpv                             # media player
    - pipewire                        # audio/video server
    # -- services --
    - avahi                           # mDNS/DNS-SD service discovery
    - grafana                         # monitoring dashboard
    - libvirt                         # virtualization API
    - nmap                            # network scanner
    - ollama                          # local LLM inference server
    - qemu-desktop                    # machine emulator (desktop profile)
    - samba                           # SMB/CIFS file sharing
    - smartmontools                   # disk health monitoring
    - telegram-desktop                # Telegram messenger
    - unbound                         # DNS resolver
    # -- fonts --
    - inter-font                      # Inter typeface
    - noto-fonts                      # Google Noto fonts
    - noto-fonts-emoji                # Google Noto emoji fonts
    - otf-font-awesome                # Font Awesome icons
    - ttf-ibm-plex                    # IBM Plex typeface
    - ttf-icomoon-feather             # Feather icons
    - ttf-jetbrains-mono-nerd         # JetBrains Mono with Nerd glyphs
    - ttf-material-symbols-variable   # Material Symbols variable font
  aur:
    - amneziawg-dkms                  # AmneziaWG DKMS kernel module
    - amneziawg-tools                 # AmneziaWG userspace tools
    - carapace-bin                    # multi-shell completion engine
    - doggo                           # DNS client (dig alternative)
    - newsraft                        # RSS/Atom feed reader (TUI)
    - pipemixer                       # PipeWire TUI mixer
    - salt                            # infrastructure automation
    - wlogout                         # Wayland logout menu
  custom:
    - albumdetails                    # music album metadata tool
    - iosevka-neg-fonts               # custom Iosevka font build
    - neg-pretty-printer              # custom pretty-printer
    - raise                           # window raise utility
    - richcolors                      # terminal color utility
    - taoup                           # Unix philosophy quotes
