defaults:
  user: neg
  home: ""
  uid: 1000
  mnt_zero: /mnt/zero
  mnt_one: /mnt/one
  is_laptop: false
  cursor_theme: Alkano-aio
  cursor_size: 23
  cpu_vendor: amd
  kvm_module: kvm_amd
  display: ""
  primary_output: ""
  greetd_vt: 1
  greetd_scale: 1
  greetd_disable_outputs: []
  timezone: Europe/Moscow
  locale: en_US.UTF-8
  floorp_profile: ""
  zen_profile: ""
  migrate_floorp_profile_to_zen: false
  hostname: "{{ grains['host'] }}"
  extra_kargs: []
  extra_modules: []
  features:
    monitoring:
      sysstat: true
      vnstat: true
      netdata: true
      loki: false
      promtail: false
      grafana: false
      alerts: false
    fancontrol: false
    dns:
      unbound: false
      adguardhome: false
      avahi: true
    services:
      samba: false
      jellyfin: false
      bitcoind: false
      duckdns: false
      transmission: false
    network:
      vm_bridge: false
      xray: false
      singbox: false
      tailscale: false
      zapret2: false
      wifi: false
    user_services:
      mail: true
      vdirsyncer: true
    amnezia: false
    outline: true
    steam: true
    mpd: true
    ollama: true
    llama_embed: true
    # Containerization cutover toggles (feature 087-containerize-services).
    # Each flag is the rollback lever for its service per FR-006:
    #   - false → native deployment (current behaviour)
    #   - true  → containerized via Podman Quadlet (requires non-null digest
    #             in states/data/container_images.yaml)
    # Flipping a flag to true MUST be paired with setting the service's
    # cutover_date in service_catalog.yaml in the same commit.
    containers:
      ollama: true
      llama_embed: true
      loki: false
      promtail: false
      grafana: false
      telethon_bridge: false      # deferred: upstream image pending (research Decision 7)
      opencode_serve: false       # deferred: upstream image pending
      opencode_telegram_bot: false # deferred: upstream image pending
      telecode: false             # deferred: upstream image pending
    floorp: false
    espanso: false
    kanata: true
    flatpak: true
    sudo_ssh_agent: false
    opencode: false
    nanoclaw: false
    telethon_bridge: false
    opencode_telegram: false
    video_ai: true
    xen_vr: false

    music_analysis: false
    tidal: false

hosts:
  telfir:
    display: 3840x2160@240
    primary_output: DP-2
    greetd_scale: 2
    floorp_profile: c85pjaxk.default-default
    zen_profile: "qnkh60k3.Default (release)"
    migrate_floorp_profile_to_zen: true
    hostname: telfir
    extra_modules:
      - ec_sys  # raw EC register access for hwmon sensors
    features:
      fancontrol: true
      monitoring:
        loki: false
        promtail: false
        grafana: false
      services:
        transmission: true
      user_services:
        mail: false
        vdirsyncer: false
      network:
        tailscale: false
        zapret2: false
      floorp: false
      music_analysis: true
      tidal: true
      xen_vr: false

aliases:
  cachyos: telfir
