# Synthetic hosts used for feature-matrix rendering/linting.
# Each entry overlay is merged with defaults from states/data/hosts.yaml.
# `name` must be a valid hostname value — referenced via grains['host'].

- name: matrix-monitoring
  description: Full monitoring stack (Loki/Promtail/Grafana)
  overrides:
    hostname: matrix-monitoring
    features:
      monitoring:
        loki: true
        promtail: true
        grafana: true

- name: matrix-services
  description: Home-server services (DNS + Samba/Jellyfin/DuckDNS/Transmission)
  overrides:
    hostname: matrix-services
    features:
      dns:
        unbound: true
        adguardhome: true
      services:
        samba: true
        jellyfin: true
        duckdns: true
        transmission: true

- name: matrix-laptop-wifi
  description: Laptop profile with WiFi and no heavy services
  overrides:
    hostname: matrix-laptop-wifi
    is_laptop: true
    cpu_vendor: intel
    kvm_module: kvm_intel
    display: 2560x1600@165
    primary_output: eDP-1
    features:
      network:
        wifi: true
      steam: false
      ollama: false
      llama_embed: false

- name: matrix-no-floorp-profile
  description: Floorp enabled but no profile configured (empty string default)
  overrides:
    hostname: matrix-no-floorp-profile
    floorp_profile: ""
    features:
      floorp: true

- name: matrix-minimal
  description: All optional features disabled (minimal workstation)
  overrides:
    hostname: matrix-minimal
    features:
      monitoring:
        sysstat: false
        vnstat: false
        netdata: false
      amnezia: false
      steam: false
      mpd: false
      ollama: false
      llama_embed: false
      floorp: false
      kanata: false
      flatpak: false
      opencode: false
      openclaw: false

- name: matrix-containerized
  description: All US1/US2 containerization flags enabled (exercises the Quadlet/container_service render path)
  overrides:
    hostname: matrix-containerized
    features:
      monitoring:
        loki: true
        promtail: true
        grafana: true
      ollama: true
      llama_embed: true
      containers:
        ollama: true
        llama_embed: true
        loki: true
        promtail: true
        grafana: true
        # US3 bridge flags stay false — upstream images deferred per research Decision 7
        telethon_bridge: false
        opencode_serve: false
        opencode_telegram_bot: false
        telecode: false
