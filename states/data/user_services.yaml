# User systemd services (consumed by user_services.sls)
#
# ── Schema ────────────────────────────────────────────────────────────
#
# unit_files:                      → macro: user_service_file(name, filename, source)
#   - id:       (required) Salt state ID for the file.managed state
#     filename: (required) systemd unit filename (e.g. "mbsync-gmail.service")
#               — source file: salt://units/<filename>
#
# enable_services:                 → macro: user_service_enable(services=...)
#   - <service_name>               — plain list of service/socket names
#                                    enabled via `systemctl --user enable`
#
# enable_now_timers:               → macro: user_service_enable(services=..., start_now=True)
#   - <timer_name>                 — plain list of timer names
#                                    enabled and started via `systemctl --user enable --now`
#
# ─────────────────────────────────────────────────────────────────────

# Custom unit files to deploy to ~/.config/systemd/user/
unit_files:
  - {id: mbsync_gmail_service, filename: mbsync-gmail.service}
  - {id: mbsync_gmail_timer, filename: mbsync-gmail.timer}
  - {id: imapnotify_gmail_service, filename: imapnotify-gmail.service}
  - {id: vdirsyncer_service, filename: vdirsyncer.service}
  - {id: vdirsyncer_timer, filename: vdirsyncer.timer}
  - {id: surfingkeys_server_service, filename: surfingkeys-server.service}
  - {id: pic_dirs_list_service, filename: pic-dirs-list.service}
  - {id: vicinae_service, filename: vicinae.service}
  - {id: proxypilot_service, filename: proxypilot.service}
  - {id: openrgb_profile_service, filename: openrgb-profile.service}
  - {id: salt_drift_service, filename: salt-drift.service}
  - {id: salt_drift_timer, filename: salt-drift.timer}

# Services/sockets to enable (systemctl --user enable)
enable_services:
  - proxypilot.service
  - imapnotify-gmail.service
  - surfingkeys-server.service
  - pic-dirs-list.service
  - vicinae.service
  - openrgb-profile.service
  - gpg-agent.socket
  - ssh-agent.socket
  - systemd-tmpfiles-setup.service  # creates hashed GPG socket dirs from user-tmpfiles.d/

# Timers to enable and start immediately (systemctl --user enable --now)
enable_now_timers:
  - mbsync-gmail.timer
  - vdirsyncer.timer
  - salt-drift.timer
