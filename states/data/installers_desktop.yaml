# Desktop application definitions for installers_desktop.sls — data separated from logic.
# URLs with ${VER} are interpolated at render time from data/versions.yaml.
#
# ── Schema ────────────────────────────────────────────────────────────
#
# curl_extract_zip:                → macro: curl_extract_zip(name, url, binary_path)
#   <name>:
#     url:          (required) ZIP URL; may contain ${VER}
#     binary_path:  (optional) path inside ZIP (default: ".")
#     binaries:     (optional) list of binaries if >1 file needed
#     dest:         (optional) install to custom dir instead of ~/.local/bin/
#     symlink:      (optional) create symlink from dest/<symlink> → ~/.local/bin/<name>
#     chmod:        (optional) bool — chmod +x extracted files
#     hash:         (optional) sha256 checksum
#
# curl_extract_tar:                → macro: curl_extract_tar(name, url, binary_pattern)
#   <name>:
#     url:             (required) tar.gz URL; may contain ${VER}
#     binary_pattern:  (required) glob/name to find binary after extraction
#     bin:             (optional) override output binary name
#     chmod:           (optional) bool — chmod +x extracted files
#     hash:            (optional) sha256 checksum
#
# curl_bin:                        → macro: curl_bin(name, url)
#   <name>:
#     url:  (required) direct download URL; may contain ${VER}
#     hash: (optional) sha256 checksum
#
# paru_install:                    → macro: paru_install(name, pkg)
#   <name>: <aur_package_name>     — simple key: value pairs
#
# ─────────────────────────────────────────────────────────────────────

curl_extract_zip:
  throne:
    url: "https://github.com/throneproj/Throne/releases/download/${VER}/Throne-${VER}-linux-amd64.zip"
    dest: "~/.local/opt/throne"
    symlink: Throne
    hash: "03b07f749f37211dcc158d4d788d61b19f45e41925cddb2858a84ed88d6e695d"
  droidcam:
    url: "https://files.dev47apps.net/linux/droidcam_${VER}.zip"
    binary_path: "."
    binaries:
      - droidcam
      - droidcam-cli
    chmod: true
    hash: "e48c145c4fed5883883c8debb92064b24679ef26c5905427d58119aa6c9e58fe"

curl_extract_tar:
  nyxt:
    url: "https://github.com/atlas-engineer/nyxt/releases/download/${VER}/Linux-Nyxt-x86_64.tar.gz"
    binary_pattern: Nyxt-x86_64.AppImage
    bin: nyxt
    chmod: true
    hash: "bfec7a2b9b2f2c0dcbf888c47538e62447f786f830870aefa8071e96963549c4"

curl_bin:
  opensoundmeter:
    url: "https://github.com/psmokotnin/osm/releases/download/v${VER}/Open_Sound_Meter-v${VER}-x86_64.AppImage"
    hash: "8f2b18318fed2110c46c99c6710067ed361c114dcfb06db954692dd49b4e92c7"

paru_install:
  antigravity: antigravity
  overskride: overskride-bin
  roomeqwizard: roomeqwizard
  bottles: bottles
  proton-ge: proton-ge-custom-bin
  xwaylandvideobridge: xwaylandvideobridge
  yandex-browser: yandex-browser
  # rofi-file-browser-extended: moved to installers_desktop.sls (needs CMAKE_POLICY_VERSION_MINIMUM for CMake 4.0)
