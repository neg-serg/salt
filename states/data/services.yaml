# Service definitions for services.sls.
# Each entry is gated by host_config.jinja features.services.<key>
# or features.network.<key> (for the network: section).
#
# ── Schema: simple ──────────────────────────────────────────────────
#
# simple:                          → macro: simple_service(name, pkgs, service)
#   <name>:
#     packages: (required) space-separated pacman package names
#     service:  (required) systemd service name to enable
#
# ── Schema: complex ─────────────────────────────────────────────────
#
# complex:                         → orchestrator loop in services.sls
#   <name>:                        # key must match features.services.<name>
#     # All fields optional; at least one actionable field must be present.
#     packages: <string>           # space-separated pacman package names
#     package_manager: pacman      # 'pacman' (default) or 'paru' (AUR)
#     service: <string>            #   systemd service name (for simple enable)
#     unit:                        # systemd unit management
#       source: <salt:// path>     #   unit file source
#       type: service              #   service|timer (default: service)
#       enabled: true              #   enable at boot (default: true)
#       running: false             #   ensure running + watch (default: false)
#       companion: <salt:// path>  #   companion unit (timer↔service pair)
#       template: null             #   'jinja' if unit needs rendering
#       unit_context: {}           #   context for unit template
#     manual_start:                # deploy but don't enable at boot
#       service: <string>          #   systemd service name to disable
#       stop: false                #   also stop the service (default: false)
#     dirs:                        # directories to create
#       - path: <absolute path>
#         mode: null               #   optional file mode
#         owner: null              #   optional owner override
#         require: []              #   optional state requisites
#     config_templates:            # config files to deploy
#       - dest: <absolute path>
#         source: <salt:// path>
#         mode: '0644'             #   file mode (default: '0644')
#         template: jinja          #   template engine (default: jinja)
#         context: {}              #   keys from known_vars (hostname, mnt_zero, etc.)
#         makedirs: false          #   create parent dirs (default: false)
#         onchanges_restart: null  #   restart this service on config change
#     scripts:                     # executable scripts to deploy
#       - dest: <absolute path>
#         source: <salt:// path>
#     healthcheck:                 # health check after service start
#       command: <shell command>
#       requires: []               #   state requisites
#     logrotate:                   # logrotate config
#       source: <salt:// path>
#     cleanup:                     # one-time file removal
#       paths: []                  #   absolute paths to remove
#       onlyif: <shell command>    #   guard
#     has_escape_hatch: false      # if true, inline .sls block handles extra logic
#
# ── Schema: network ─────────────────────────────────────────────────
#
# network:                         → orchestrator loop in services.sls
#   <name>:                        # key must match features.network.<name>
#     # Same fields as complex: above, plus:
#     #   package_manager: paru    # AUR packages (xray uses paru)
#     #   service: tailscaled      # for simple enable (no custom unit)
#
# ─────────────────────────────────────────────────────────────────────

simple:
  jellyfin:
    packages: jellyfin-server jellyfin-web  # media server
    service: jellyfin
  transmission:
    packages: transmission-cli  # BitTorrent client
    service: transmission

complex:
  duckdns:
    scripts:
      - dest: /usr/local/bin/duckdns-update  # dynamic DNS update script
        source: salt://scripts/duckdns-update.sh
    unit:
      source: salt://units/duckdns-update.timer
      type: timer
      enabled: false  # enable after creating /etc/duckdns.env
      companion: salt://units/duckdns-update.service

  samba:
    packages: samba  # SMB file sharing
    dirs:
      - path: /mnt/zero/sync/smb  # shared directory
        mode: '0755'
        require:
          - mount: mount_zero
    config_templates:
      - dest: /etc/samba/smb.conf  # Samba configuration
        source: salt://configs/smb.conf.j2
        template: jinja
        makedirs: true
        context:
          hostname: hostname
          mnt_zero: mnt_zero
          user: user
    manual_start:
      service: smb  # manual start only: systemctl start smb
      stop: false

  bitcoind:
    packages: bitcoin-daemon  # Bitcoin Core node
    cleanup:
      paths:
        - /usr/local/bin/bitcoind   # legacy manually-installed binary
        - /usr/local/bin/bitcoin-cli
      onlyif: test -f /usr/local/bin/bitcoind
    unit:
      source: salt://units/bitcoind.service
      enabled: false  # manual start: systemctl start bitcoind
      requires:
        - cmd: managed_service_accounts_ensure
        - cmd: managed_service_paths_ensure
    logrotate:
      source: salt://configs/bitcoind-logrotate

  transmission:
    # packages + service enable handled by simple.transmission above
    dirs:
      - path: /home/neg/dw       # torrent watch directory
      - path: /home/neg/torrent/data  # download directory
    healthcheck:
      command: curl -sf http://127.0.0.1:9091/transmission/web/ >/dev/null 2>&1
      requires:
        - service: transmission_enabled
    has_escape_hatch: true  # ACLs + config replacements + stop/restart lifecycle

# ===================================================================
# Network services (data-driven: gated by features.network.<name>)
# ===================================================================
# Same schema as complex: above, plus:
#   package_manager: 'paru' for AUR packages (default: 'pacman')

network:
  xray:
    packages: xray
    package_manager: paru
    dirs:
      - path: /etc/xray
        mode: '0750'
    unit:
      source: salt://units/xray.service
      enabled: false
      requires:
        - cmd: install_xray
    cleanup:
      paths:
        - /home/neg/.local/bin/xray  # legacy manually-installed binary
      onlyif: test -f /home/neg/.local/bin/xray

  singbox:
    unit:
      source: salt://units/sing-box-tun.service
      template: jinja
      enabled: null  # skip enable/disable (enabled=None)
      unit_context:
        home: home
        uid: uid

  tailscale:
    packages: tailscale
    service: tailscaled  # enable package-provided service (no custom unit)
    config_templates:
      - dest: /etc/unbound/unbound.conf.d/tailscale.conf
        source: salt://configs/tailscale-dns-stub.conf.j2
        makedirs: true
        require:
          - cmd: install_unbound
        onchanges_restart: unbound  # restart unbound on config change

# ===================================================================
# DNS services (data-driven: gated by features.dns.<name>)
# ===================================================================

dns:
  unbound:
    packages: unbound
    config_templates:
      - dest: /etc/unbound/unbound.conf
        source: salt://configs/unbound.conf
        makedirs: true
        mode: '0644'
    dirs:
      - path: /etc/unbound/unbound.conf.d
        mode: '0755'
    setup_commands:
      - name: unbound-anchor -a /var/lib/unbound/root.key || true
        creates: /var/lib/unbound/root.key
      - name: unbound-control-setup
        creates: /etc/unbound/unbound_server.pem
    unit_override:
      name: unbound_restart_override
      service: unbound.service
      source: salt://units/unbound-restart-override.conf
    ensure_running:
      service: unbound
      watch:
        - file: unbound_config_0
        - file: unbound_restart_override
    healthcheck:
      command: unbound-control status >/dev/null 2>&1
      requires:
        - service: unbound_running

  adguardhome:
    packages: adguardhome
    cleanup:
      paths:
        - /usr/local/bin/AdGuardHome  # legacy manually-installed binary
      onlyif: test -f /usr/local/bin/AdGuardHome
    config_templates:
      - dest: /var/lib/adguardhome/AdGuardHome.yaml
        source: salt://configs/adguardhome-initial.yaml
        makedirs: true
        mode: '0640'
        replace: false
        user: adguardhome
        group: adguardhome
        require:
          - cmd: managed_service_accounts_ensure
          - cmd: managed_service_paths_ensure
      - dest: /etc/systemd/resolved.conf.d/adguardhome.conf
        source: salt://configs/resolved-adguardhome.conf
        makedirs: true
        mode: '0644'
        require:
          - cmd: adguardhome_start
        onchanges_restart: systemd-resolved
    unit:
      source: salt://units/adguardhome.service.j2
      template: jinja
      unit_context:
        dns_unbound: dns_unbound  # resolved at render time
      enabled: true
      running: true
      requires:
        - file: adguardhome_config_0
        - cmd: managed_service_accounts_ensure
        - cmd: managed_service_paths_ensure
    healthcheck:
      command: curl -sf http://127.0.0.1:3000/ >/dev/null 2>&1
      requires:
        - service: adguardhome_enabled

  avahi:
    packages: avahi avahi-tools nss-mdns
    service: avahi-daemon  # enable package-provided service
    config_templates:
      - dest: /etc/avahi/avahi-daemon.conf
        source: salt://configs/avahi-daemon.conf
        makedirs: true
        mode: '0644'
    ensure_running:
      service: avahi-daemon
      watch:
        - file: avahi_config_0
