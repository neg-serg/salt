# Free AI provider fallback configuration for ProxyPilot.
# Emergency-only: these providers activate via dedicated fallback-* aliases
# when paid providers (Anthropic, Antigravity/Gemini) are unavailable.
#
# Priority ordering (quality-tiered):
#   1. Groq       — fastest inference (custom LPU), strong models, generous limits
#   2. Mistral    — massive token limit (1B/month), good coding models (Codestral)
#   3. Cerebras   — 1M tokens/day, very fast inference, Qwen3 235B
#   4. OpenRouter  — model aggregator, 27+ free models, auto-routing
#   5. SambaNova  — good models but lower RPM limits (10-20)
#   6. Ollama     — local last-resort, always available, zero network dependency
#
# Alias pooling: shared aliases across providers enable round-robin failover.
#   fallback-large  — general-purpose large models (6 providers)
#   fallback-code   — code-specialized models (3 providers)
#   fallback-medium — mid-tier models (2 providers)
#   fallback-small  — fast small models (2 providers)
#
# Adding a provider: add entry here + gopass insert api/<name> + just
# Removing a provider: remove entry here + just

providers:
  - name: "groq"
    base_url: "https://api.groq.com/openai/v1"
    gopass_key: "api/groq"
    priority: 1
    models:
      - name: "llama-3.3-70b-versatile"
        alias: "fallback-large"
      - name: "qwen/qwen3-32b"
        alias: "fallback-medium"

  - name: "mistral"
    base_url: "https://api.mistral.ai/v1"
    gopass_key: "api/mistral"
    priority: 2
    models:
      - name: "codestral-latest"
        alias: "fallback-code"
      - name: "mistral-small-latest"
        alias: "fallback-large"

  - name: "cerebras"
    base_url: "https://api.cerebras.ai/v1"
    gopass_key: "api/cerebras"
    priority: 3
    models:
      - name: "qwen-3-235b-a22b-instruct"
        alias: "fallback-large"
      - name: "llama3.1-8b"
        alias: "fallback-small"

  - name: "openrouter"
    base_url: "https://openrouter.ai/api/v1"
    gopass_key: "api/openrouter"
    priority: 4
    models:
      - name: "qwen/qwen3-coder-480b-a35b:free"
        alias: "fallback-code"
      - name: "openrouter/auto"
        alias: "fallback-large"

  - name: "sambanova"
    base_url: "https://api.sambanova.ai/v1"
    gopass_key: "api/sambanova"
    priority: 5
    models:
      - name: "Meta-Llama-3.3-70B-Instruct"
        alias: "fallback-large"
      - name: "Meta-Llama-3.1-8B-Instruct"
        alias: "fallback-small"

  - name: "ollama"
    base_url: "http://localhost:11434/v1"
    dummy_key: "ollama"
    priority: 6
    models:
      - name: "qwen3.5:27b"
        alias: "fallback-large"
      - name: "qwen2.5-coder:7b"
        alias: "fallback-code"
      - name: "qwen3:14b"
        alias: "fallback-medium"
