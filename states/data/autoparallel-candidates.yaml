# Compiler auto-parallelism potential for installed packages.
# Classifies packages by benefit from GCC Graphite (-ftree-parallelize-loops=N)
# or LLVM Polly (-mllvm -polly -polly-parallel) after recompilation.
#
# Generated by: 019-autoparallel-research
# Generated on: 2026-03-12
# System: CachyOS, GCC 15.2.1, 32-core AMD, makepkg.conf: -O3 -march=native LTO
#
# potential: high | moderate | low | not-applicable
# workload_type: data-parallel | loop-intensive | reduction | io-bound | event-driven | mixed
# existing_parallelism: none | openmp | pthreads | rayon | tbb | gpu | goroutines
# compiler_backend: gcc-graphite | polly | both | none
# risk: low | medium | high

# ── High Potential ──────────────────────────────────────────────────
# Single-threaded C/C++ programs with CPU-bound data processing loops.
# Best candidates for auto-parallelism: simple array access patterns,
# no existing parallelism, measurable compute time per invocation.

high:
  - name: tesseract  # OCR engine — already uses OpenMP for pixel ops; benchmark showed 0% gain from auto-par
    language: cpp
    potential: moderate
    workload_type: data-parallel
    existing_parallelism: openmp
    compiler_backend: gcc-graphite
    risk: medium
    benchmark_workload: "tesseract sample.png output -l eng"
    notes: "Already links libgomp (OpenMP); auto-parallelism benchmark showed no improvement (3.83s→3.82s)"

  - name: optipng  # lossless PNG optimizer — deflate search across parameters
    language: c
    potential: high
    workload_type: loop-intensive
    existing_parallelism: none
    compiler_backend: gcc-graphite
    risk: low
    benchmark_workload: "optipng -o7 test.png"
    notes: "Tries multiple compression strategies in sequence; inner deflate loops are parallelizable"

  - name: pngquant  # PNG 8-bit quantizer — median-cut color quantization
    language: c
    potential: high
    workload_type: data-parallel
    existing_parallelism: none
    compiler_backend: gcc-graphite
    risk: low
    benchmark_workload: "pngquant --quality=65-80 --speed 1 test.png"
    notes: "Color histogram computation and palette mapping are data-parallel over pixels"

  - name: jpegoptim  # JPEG optimization — Huffman recoding
    language: c
