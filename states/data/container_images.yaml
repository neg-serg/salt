# Container image registry — single source of truth for Podman Quadlet images.
#
# Rules:
#   - Remote images (docker.io, ghcr.io) MUST have a non-null `digest`.
#   - Localhost images (built manually via `podman build`) have `digest: null`.
#   - Tag-based references are forbidden anywhere.
#   - Digest format: `sha256:<64 hex chars>`.

# ─── Inference layer ─────────────────────────────────────────────────
ollama:
  registry: docker.io
  image: ollama/ollama
  variant: rocm
  digest: sha256:24055d988770c0de2552fe14edff8af1508802a074638527f7578fdc332ccdbe
  approved_at: "2026-04-10"
  note: "Ollama LLM server; ROCm build for AMD 7900 XTX inference"

llama_embed:
  registry: ghcr.io
  image: ggml-org/llama.cpp
  variant: server-vulkan
  digest: sha256:9532e967519cf3bcf15bd6f8c3d8af2c55c7363c04ac56ab3ddd952748259c03
  approved_at: "2026-04-10"
  note: "llama.cpp server with Vulkan backend; hosts Qwen3-Embedding-8B"

