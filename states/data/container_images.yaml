# Container image digest registry — single source of truth for FR-014
# (digest-pinned, upstream-only container references for the 087 feature).
#
# Rules:
#   - Every P1/P2 entry MUST have a non-null `digest` and `approved_at` before
#     its feature toggle can be flipped to `true` in hosts.yaml.
#   - P3 bridge entries may have `digest: null` until a first-party upstream
#     image is identified per research.md Decision 7. The container_service
#     macro emits zero states for services with a null digest (upstream-image
#     gate pattern).
#   - Tag-based references (`image:latest`, `image:vX.Y.Z`) are forbidden
#     anywhere in this file or in Quadlet unit templates that consume it.
#   - Digest format is strictly `sha256:<64 hex chars>`; enforced by the
#     container_service macro at render time.
#
# Upstream coordinate verification (T004 step 1):
#   2026-04-10 — verified via `podman manifest inspect <ref>`:
#     OK   docker.io/ollama/ollama:rocm
#     OK   ghcr.io/ggml-org/llama.cpp:server-vulkan    (account renamed from
#          ggerganov → ggml-org in mid-2024; the ggerganov coordinate is stale
#          and returns `manifest unknown` — verification caught this before
#          any task tried to use it, closing H2)
#     OK   docker.io/grafana/loki:latest
#     OK   docker.io/grafana/promtail:latest
#     OK   docker.io/grafana/grafana-oss:latest
#   Bridge tier (telethon_bridge, opencode_*, telecode): no first-party upstream
#   images identified yet — deferred per research Decision 7.

# ─── US1: Inference layer ────────────────────────────────────────────
ollama:
  registry: docker.io
  image: ollama/ollama
  variant: rocm
  digest: sha256:24055d988770c0de2552fe14edff8af1508802a074638527f7578fdc332ccdbe
  approved_at: "2026-04-10"
  note: "Ollama LLM server; ROCm build for AMD 7900 XTX inference"

llama_embed:
  registry: ghcr.io
  image: ggml-org/llama.cpp        # was ggerganov/llama.cpp before mid-2024 rename; see T004 verification note above
  variant: server-vulkan
  digest: sha256:9532e967519cf3bcf15bd6f8c3d8af2c55c7363c04ac56ab3ddd952748259c03
  approved_at: "2026-04-10"
  note: "llama.cpp server build with Vulkan backend; hosts Qwen3-Embedding-8B. Manifest-list digest (multi-arch); amd64 sub-manifest is sha256:57fadb107463e96971d3f3354bf8b28ef156bf3d197c45bedcd8f6cc4beb68f5."

