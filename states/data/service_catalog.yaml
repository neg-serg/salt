# Unified service catalog — single source of truth for ports, health
# endpoints, unit names, packages, and scope. Consumed via import_yaml by
# _macros_service.jinja (service_with_healthcheck, container_service) and
# individual .sls files.
#
# Fields (core):
#   port:         HTTP port (optional — omit for non-HTTP services)
#   health_path:  URL path for HTTP healthcheck (optional)
#   health_cmd:   Custom healthcheck command (optional — overrides port+health_path)
#   unit:         systemd unit name (required)
#   scope:        system | user (required)
#   packages:     pacman/AUR package name(s) (optional — omit if installed externally)
#   manual_start: true if service should NOT be enabled at boot (optional, default false)
#   timeout:      healthcheck timeout override in seconds (optional, default 30)
#   health_host:  bind address override (optional, default 127.0.0.1)
#
# Fields (containerization):
#   container_image:  string key into container_images.yaml (must match a
#                     top-level map key there).
#   gpu:              none (default) | amdgpu (/dev/kfd + /dev/dri/renderD128)
#                     | render_group (/dev/dri/renderD128 only, Vulkan-only).
#   bind_mounts:      list of {host: <path>, container: <path>, mode: ro|rw}.
#                     Tilde (~) in host paths is expanded to the invoking user's
#                     home by the container_service macro at render time.
#   env_file:         absolute host path for Quadlet `EnvironmentFile=`, or null.

loki:                          # Log aggregation (Grafana Loki)
  port: 3100
  health_path: /ready
  unit: loki
  scope: system
  packages: loki
  container_image: loki
  gpu: none
  bind_mounts:
    - host: /etc/loki
      container: /etc/loki
      mode: ro                 # Salt-managed config; container reads it read-only
    - host: /var/lib/loki-container
      container: /var/lib/loki
      mode: rw                 # Container state dir
  env_file: null

promtail:                      # Log shipper for Loki
  port: 9080
  health_path: /ready
  unit: promtail
  scope: system
  packages: promtail
  container_image: promtail
  gpu: none
  bind_mounts:
    - host: /etc/promtail
      container: /etc/promtail
      mode: ro
    - host: /var/log/journal
      container: /var/log/journal
      mode: ro                 # systemd journal (persistent)
    - host: /run/log/journal
      container: /run/log/journal
      mode: ro                 # systemd journal (runtime)
  env_file: null

grafana:                       # Monitoring dashboard
  port: 3030
  health_path: /api/health
  unit: grafana
  scope: system
  packages: grafana
  container_image: grafana
  gpu: none
  bind_mounts:
    - host: /etc/grafana.ini
      container: /etc/grafana/grafana.ini
      mode: ro
    - host: /etc/grafana/provisioning
      container: /etc/grafana/provisioning
      mode: ro                 # provisioning-as-code already Salt-managed
    - host: /var/lib/grafana-container
      container: /var/lib/grafana
      mode: rw
  env_file: null

adguardhome:                   # DNS-level ad blocker
  port: 3000
  health_path: /
  unit: adguardhome
  scope: system
  packages: adguardhome

ollama:                        # Local LLM inference server
  port: 11434
  health_path: /api/tags
  unit: ollama
  scope: system
  manual_start: true
  packages: null               # installed via container_service image pull
  container_image: ollama
  gpu: amdgpu                  # /dev/kfd (ROCm) + /dev/dri/renderD128
  bind_mounts:
    - host: /mnt/one/ollama/models
      container: /root/.ollama/models
      mode: rw
  env_file: null

llama_embed:                   # llama.cpp embedding server (Vulkan)
  port: 11435
  health_path: /health
  unit: llama_embed
  scope: system
  packages: llama.cpp-vulkan
  timeout: 90
  manual_start: true
  container_image: llama_embed
  gpu: render_group            # Vulkan-only; no /dev/kfd needed
  bind_mounts:
    - host: /mnt/one/llama-embed/models
      container: /models
      mode: ro
  env_file: null

t5_summarization:              # llama.cpp T5 summarization server (Vulkan)
  port: 11436
  health_path: /health
  unit: t5_summarization
  scope: system
  packages: llama.cpp-vulkan
  timeout: 90
  manual_start: true
  container_image: llama_embed   # reuses ggml-org/llama.cpp:server-vulkan
  gpu: render_group              # Vulkan-only; no /dev/kfd needed
  bind_mounts:
    - host: /mnt/one/t5-summarization/models
      container: /models
      mode: ro
  env_file: null

jellyfin:                      # Media server (containerized)
  port: 8096
  health_path: /health
  unit: jellyfin
  scope: system
  packages: null               # installed via container_service image pull
  container_image: jellyfin
  gpu: render_group            # VA-API hardware transcoding
  bind_mounts:
    - host: /etc/jellyfin
      container: /config
      mode: rw                 # Jellyfin config + library database
    - host: /var/cache/jellyfin
      container: /cache
      mode: rw                 # transcoding cache, thumbnails
  env_file: null

transmission:                  # BitTorrent client (containerized)
  port: 9091
  health_path: /transmission/web/
  unit: transmission
  scope: system
  packages: null               # installed via container_service image pull
  container_image: transmission
  gpu: none
  bind_mounts:
    - host: /etc/transmission
      container: /config
      mode: rw                 # transmission config (settings.json lives here)
    - host: ~/dw
      container: /watch
      mode: rw                 # torrent watch directory
    - host: ~/torrent/data
      container: /downloads
      mode: rw                 # download directory
  env_file: null

unbound:                       # Recursive DNS resolver
  health_cmd: "unbound-control status >/dev/null 2>&1"
  unit: unbound
  scope: system
  packages: unbound

samba:                         # SMB file sharing
  unit: smb
  scope: system
  packages: samba
  manual_start: true

bitcoind:                      # Bitcoin Core node
  unit: bitcoind
  scope: system
  packages: bitcoin-daemon
  manual_start: true

# ─── Bridge tier (localhost images, built manually) ──────────────────
proxypilot:                    # LLM proxy (containerized)
  port: 8317
  health_path: /health
  unit: proxypilot
  scope: user
  packages: null               # installed via container_service image pull
  container_image: proxypilot
  gpu: none
  bind_mounts:
    - host: ~/.config/proxypilot
      container: /config
      mode: rw                 # ProxyPilot config.yaml
    - host: ~/.cli-proxy-api
      container: /root/.cli-proxy-api
      mode: rw                 # auth directory
  env_file: null

telethon_bridge:               # Telegram bridge (python-telethon)
  unit: telethon-bridge
  scope: user
  packages: python-telethon
  health_cmd: "pgrep -f telethon-bridge"
  container_image: telethon_bridge
  gpu: none
  bind_mounts:
    - host: ~/.telethon-bridge
      container: /data
      mode: rw
  env_file: null

opencode_serve:                # OpenCode HTTP API server
  port: 4096
  health_path: /
  unit: opencode-serve
  scope: user
  container_image: opencode_serve
  gpu: none
  bind_mounts:
    - host: ~/.config/opencode
      container: /config
      mode: rw
  env_file: null

opencode_telegram_bot:         # OpenCode Telegram bot
  unit: opencode-telegram-bot
  scope: user
  health_cmd: "pgrep -f opencode-telegram"
  container_image: opencode_telegram_bot
  gpu: none
  bind_mounts:
    - host: ~/.config/opencode-telegram-bot
      container: /config
      mode: rw
  env_file: null

telecode:                      # Telecode Telegram agent
  unit: telecode
  scope: user
  health_cmd: "pgrep -f telecode"
  container_image: telecode
  gpu: none
  bind_mounts:
    - host: ~/.telecode
      container: /data
      mode: rw
  env_file: null
