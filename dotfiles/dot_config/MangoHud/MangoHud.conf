# MangoHud overlay configuration
# Hidden by default, toggle with Shift_R+F12

no_display
toggle_hud=Shift_R+F12
toggle_fps_limit=Shift_R+F11

# Position and style (readable at 4K)
position=top-left
font_size=24
round_corners=8
background_alpha=0.6

# Metrics
fps
frametime
cpu_stats
cpu_temp
gpu_stats
gpu_temp
gpu_power
ram
vram

# Game context
vulkan_driver
wine
gamemode
