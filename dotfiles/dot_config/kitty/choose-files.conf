show_preview yes
show_hidden last
respect_ignores last
sort_by_last_modified last
dark_pygments_style github-dark

# Fast directory jumps inside kitty choose-files.
map alt+1 cd ~
map alt+2 cd /
map alt+3 cd /tmp
map alt+d cd ~/dw
map alt+o cd ~/doc
map alt+s cd ~/src
map alt+m cd ~/music
map alt+p cd ~/pic
map alt+v cd ~/vid

# Keep common runtime toggles on explicit, easy-to-remember keys.
map alt+h toggle dotfiles
map alt+i toggle ignorefiles
map alt+l toggle sort_by_dates
map alt+, toggle preview
