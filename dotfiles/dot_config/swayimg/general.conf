[general]
# Startup mode: viewer | slideshow | gallery
mode = viewer
# Show window decorations (borders, titlebar)
decoration = no
# Actions for SIGUSR1/SIGUSR2
sigusr1 = reload
sigusr2 = next_file
# Wayland app_id
app_id = swayimg
# Overlay keeps the viewer aligned with the focused window (replaces legacy size=parent)
overlay = yes

[gallery]
size = 200
selected_scale = 1.15
aspect = fill
padding = 4
select = #002d59ff
background = #080808ff
border_color = #005f87ff
border_width = 3
window = #000000ff
cache = 100
preload = no
pstore = yes
antialiasing = mks13
