context.modules = [
    {   name = libpipewire-module-loopback
        args = {
            node.description = "RME AES (Genelec)"
            capture.props = {
                node.name = "rme-genelec"
                media.class = "Audio/Sink"
                audio.position = [ FL FR ]
            }
            playback.props = {
                target.object = "alsa_output.usb-RME_ADI-2_4_Pro_SE__53011083__B992903C2BD8DC8-00.pro-output-0"
                # USB channels 7/8 (zero-indexed AUX6/AUX7). Per ADI-2/4 Pro SE manual §17.4.2
                # USB 5/6 is the "typical" AES source, but Dig Out Source can be reassigned to
                # USB 7/8 — this config assumes that reassignment is in effect. If sound still
                # does not reach the Genelec speakers, try AUX4/AUX5 or check ADI-2 Remote:
                # SETUP → Options → Device Mode/DSD → Dig Out Source.
                audio.position = [ AUX6 AUX7 ]
                node.passive = false
                node.dont-reconnect = true
                stream.dont-remix = true
            }
        }
    }
    {   name = libpipewire-module-loopback
        args = {
            node.description = "RME Headphones (Phones 1/2)"
            capture.props = {
                node.name = "rme-headphones"
                media.class = "Audio/Sink"
                audio.position = [ FL FR ]
            }
            playback.props = {
                target.object = "alsa_output.usb-RME_ADI-2_4_Pro_SE__53011083__B992903C2BD8DC8-00.pro-output-0"
                # USB channels 1/2 (zero-indexed AUX0/AUX1) → Line Out XLR + PH 1/2 via shared DSP.
                # Do NOT move to AUX2/AUX3 unless the device's Phones Out 3/4 Source is set to
                # USB 3/4 (default is Auto = mirror USB 1/2, which leaves AUX2/AUX3 silent).
                audio.position = [ AUX0 AUX1 ]
                node.passive = false
                node.dont-reconnect = true
                stream.dont-remix = true
            }
        }
    }
    {   name = libpipewire-module-loopback
        args = {
            node.description = "RME Mic"
            capture.props = {
                target.object = "alsa_input.usb-RME_ADI-2_4_Pro_SE__53011083__B992903C2BD8DC8-00.pro-input-0"
                audio.position = [ AUX0 AUX1 ]
                node.dont-reconnect = true
                stream.dont-remix = true
            }
            playback.props = {
                node.name = "rme-mic"
                media.class = "Audio/Source"
                audio.position = [ FL FR ]
            }
        }
    }
