# Single source of truth for session-wide environment
# Sourced by: systemd (environment.d), greetd session-wrapper, zsh (.zshenv)

# XDG Base Directories
XDG_CONFIG_HOME=${HOME}/.config
XDG_CACHE_HOME=${HOME}/.cache
XDG_DATA_HOME=${HOME}/.local/share
XDG_STATE_HOME=${HOME}/.local/state

# XDG User Directories (override xdg-user-dirs canonical defaults)
XDG_DESKTOP_DIR=${HOME}/.local/desktop
XDG_DOCUMENTS_DIR=${HOME}/doc
XDG_DOWNLOAD_DIR=${HOME}/dw
XDG_MUSIC_DIR=${HOME}/music
XDG_PICTURES_DIR=${HOME}/pic
XDG_VIDEOS_DIR=${HOME}/vid
XDG_PUBLICSHARE_DIR=${HOME}/.local/public
XDG_TEMPLATES_DIR=${HOME}/.local/templates

# Core
EDITOR=nvim
TERMINAL=kitty

# Tool paths (XDG compliance)
CARGO_HOME=${XDG_DATA_HOME}/cargo
RUSTUP_HOME=${XDG_DATA_HOME}/rustup
GOMODCACHE=${XDG_CACHE_HOME}/gomod
GNUPGHOME=${XDG_DATA_HOME}/gnupg
NPM_CONFIG_USERCONFIG=${XDG_CONFIG_HOME}/npm/npmrc
RIPGREP_CONFIG_PATH=${XDG_CONFIG_HOME}/ripgrep/ripgreprc

# Secrets / GPG
SSH_AUTH_SOCK=${XDG_RUNTIME_DIR}/ssh-agent.socket

# XDG Portal (file dialogs via termfilechooser)
GTK_USE_PORTAL=1

# PATH
PATH=${HOME}/.local/bin:${CARGO_HOME}/bin:${PATH}
