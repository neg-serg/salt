input-ipc-server=~~/socket
cache=no
gpu-shader-cache-dir=~~/shader-cache/
hwdec=auto-copy
profile=high-quality
vd-lavc-dr=auto
vd-lavc-threads=0
vo=gpu-next
gpu-api=vulkan
target-colorspace-hint=no  # prevent compositor HDR switching; tone-map in mpv instead

deband-grain=48
deband-iterations=2
deband=yes
video-sync=audio
video-output-levels=full
cscale=ewa_lanczossharp
dscale=mitchell
linear-downscaling=yes
scale=ewa_lanczos
fbo-format=rgba16hf
cscale-antiring=0.7
dscale-antiring=0.7
scale-antiring=0.7
ao=pipewire,alsa,jack
volume-max=100
alang=en
slang=ru,rus
border=no
fullscreen=yes
sub-auto=fuzzy
sub-font="Helvetica Neue LT Std"
sub-gauss=.82
sub-gray=yes
sub-scale=0.7
cursor-autohide=500
osc=no
osd-bar=no
osd-border-color='#cc000000'
osd-border-size=1
osd-color='#bb6d839e'
osd-font=Iosevka
osd-font-size=20
osd-status-msg=${time-pos} / ${duration} (${percent-pos}%)${?estimated-vf-fps: FPS: ${estimated-vf-fps}}
ytdl-format=bestvideo+bestaudio/best
screenshot-template=~/dw/scr-%F_%P
msg-level=auto_profiles=warn

# Include profiles split into profiles.conf
include=~~/profiles.conf
