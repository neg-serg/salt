# --- Profiles ---
[audio-only]
profile-desc=Audio-only files
profile-cond=p["vid"] == false
term-osd-bar-chars=──╼ ·
term-osd-bar=yes

[extension.gif]
loop-file=yes

[protocol.http]
cache-pause=no
cache=yes

[protocol.https]
profile=protocol.http

[protocol.ytdl]
profile=protocol.http

[4k]
profile-desc=4K
profile-cond=(width==3840 and height==2160)
deband=no

[hdr]
profile-desc=HDR passthrough
target-colorspace-hint=yes
target-prim=bt.2020
target-trc=pq

# --- Audio Profiles ---
[headphones]
profile-desc=Crossfeed for headphones (bs2b)
af=lavfi=[bs2b=profile=default]

[binaural]
profile-desc=HRTF binaural spatialization (requires ffmpeg with libmysofa)
af=lavfi=[sofalizer=sofa=/home/neg/.config/mpv/hrtf/MIT_KEMAR.sofa:type=freq]

[audio-off]
profile-desc=No audio processing
af=

# --- Shader Profiles ---
[ai-off]
glsl-shaders-clr

[ai-fsrcnnx]
glsl-shaders="~~/shaders/FSRCNNX_x2_8-0-4-1.glsl;~~/shaders/SSimSuperRes.glsl"

[ai-anime4k]
glsl-shaders="~~/shaders/Anime4K_Upscale_CNN_x2_S.glsl"

[ai-krig]
profile-desc=KrigBilateral chroma upscaling
glsl-shaders-append=~~/shaders/KrigBilateral.glsl
