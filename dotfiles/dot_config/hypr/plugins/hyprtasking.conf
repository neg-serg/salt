# Hyprtasking — workspace overview (Mission Control-style grid)
# https://github.com/raybbian/hyprtasking

plugin:hyprtasking {
    layout = grid
    bg_color = 0x000000FF
    gap_size = 6
    border_size = 2
    exit_on_hovered = true

    grid {
        rows = 3
        cols = 3
        loop = false
    }
}
