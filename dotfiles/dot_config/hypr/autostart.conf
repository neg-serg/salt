$terminal = kitty --single-instance --class term
$wallpaper = wl-daemon
$clipboard_manager = zsh -c 'pkill "wl-paste --watch cliphist store"; wl-paste --watch cliphist store'
exec = ~/.local/bin/unlock

exec-once = hyprpm reload
exec-once = systemctl --user start --no-block hyprpolkitagent.service
exec-once = systemctl --user restart --no-block hyprscratch.service
exec-once = hyprpwcenter
exec-once = $wallpaper
exec-once = wl restore # Restore last wallpaper immediately so the screen isn't blank at login
exec-once = $terminal
exec-once = swayosd-server
exec-once = $clipboard_manager
exec-once = systemctl --user restart --no-block quickshell.service # Quickshell panel via systemd (self-heals on crash)
exec-once = nicotine # Nicotine+ (Soulseek client)
exec-once = ~/.local/bin/hypr-focus-hist # Window focus history tracker (enables alt-tab to previous window)
exec-once = ~/.local/bin/gpg-warmup # Trigger one gopass unlock/decrypt early so age-agent or gpg-agent is ready before secret consumers start rendering templates.
exec-once = systemctl --user start --no-block vicinae.service # Vicinae server under systemd user session
exec-once = systemctl --user start --no-block surfingkeys-server.service # Surfingkeys HTTP server (serves config to browser extension)
