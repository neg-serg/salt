bind = $M4+$M1, r, submap, resize
submap = resize
# Directional resize (10px increments)
binde = , right, resizeactive, 10 0
binde = , left, resizeactive, -10 0
binde = , up, resizeactive, 0 -10
binde = , down, resizeactive, 0 10
binde = , l, resizeactive, 10 0
binde = , h, resizeactive, -10 0
binde = , k, resizeactive, 0 -10
binde = , j, resizeactive, 0 10
binde = $S, l, resizeactive, -10 0
binde = $S, h, resizeactive, 10 0
binde = $S, k, resizeactive, 0 10
binde = $S, j, resizeactive, 0 -10

# Proportional resize (floating windows, preserves aspect ratio)
binde = , equal, exec, ~/.local/bin/hypr-resize-proportional +10
binde = , minus, exec, ~/.local/bin/hypr-resize-proportional -10
binde = $S, equal, exec, ~/.local/bin/hypr-resize-proportional +25
binde = $S, minus, exec, ~/.local/bin/hypr-resize-proportional -25

bind = , Return, submap, reset
source = ~/.config/hypr/bindings/_resets.conf
