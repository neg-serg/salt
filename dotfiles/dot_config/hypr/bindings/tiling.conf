bind = $M4, minus, submap, tiling
submap = tiling
# Scrolling: move windows between columns (dispatcher, not layoutmsg)
bind = $S, h, movewindow, l
bind = $S, j, movewindow, d
bind = $S, k, movewindow, u
bind = $S, l, movewindow, r

# Scrolling: column resize (cycle through explicit_column_widths)
bind = , equal, layoutmsg, colresize +conf
bind = , minus, layoutmsg, colresize -conf

# Scrolling: exact column widths (quarter → third → half → two-thirds → full)
bind = , 1, layoutmsg, colresize exact 0.25
bind = , 2, layoutmsg, colresize exact 0.33
bind = , 3, layoutmsg, colresize exact 0.5
bind = , 4, layoutmsg, colresize exact 0.66
bind = , 5, layoutmsg, colresize exact 0.75
bind = , 6, layoutmsg, colresize exact 1.0

# Scrolling: fine-grained pixel resize
binde = , bracketright, layoutmsg, colresize +50
binde = , bracketleft, layoutmsg, colresize -50

# Scrolling: promote window to its own column
bind = , p, layoutmsg, promote

# Scrolling: swap columns
bind = $C, h, layoutmsg, swapcol l
bind = $C, l, layoutmsg, swapcol r

# Scrolling: fit modes
bind = , f, layoutmsg, fit active
bind = $S, f, layoutmsg, fit all

# Scrolling: scroll viewport
binde = , h, layoutmsg, move -200
binde = , l, layoutmsg, move +200
binde = $S, bracketleft, layoutmsg, move -600
binde = $S, bracketright, layoutmsg, move +600

# Scrolling: toggle fit method (center ↔ fit)
bind = , t, layoutmsg, togglefit

source = ~/.config/hypr/bindings/_resets.conf
