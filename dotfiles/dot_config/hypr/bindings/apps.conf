bind = $M4, d, exec, scratchpad-toggle teardown
bind = $M4, a, exec, scratchpad-toggle amnezia
bind = $M4, e, exec, scratchpad-toggle im
bind = $M4, f, exec, scratchpad-toggle music
bind = $M4, t, exec, scratchpad-toggle torrment
bind = $M4+$C, p, exec, scratchpad-toggle mixer

bind = $M4, w, exec, raise --match "class:regex=^zen$" --launch zen-browser
bind = $M4+$S, w, exec, raise --match "class:regex=^(floorp|one\.ablaze\.floorp|floorpdeveloperedition)$" --launch floorp
bind = $M4, x, exec, raise --match "class:regex=^term$" --launch "kitty --single-instance --class term"
bind = $M4, q, exec, raise --match "class:regex=^nwim$" --launch "kitty --single-instance --class nwim -e v"
bind = $M4, b, exec, raise --match "class:regex=^mpv$" --launch "~/.local/bin/pl video"
bind = $M4+$C, c, exec, raise --match "class:regex=^swayimg$" --launch "swayimg ~/dw"
bind = $M4+$S, c, exec, wl random ~/pic/wl
bind = $M4+$C, v, exec, raise --match "class:regex=^Bazecor$" --launch "bazecor"
bind = $M4, g, exec, raise --match "class:regex=^(steam|steam_app.*|gamescope)$" --launch steam
bind = $M4+$S, g, exec, raise --match "class:regex=^(lutris|net\\.lutris\\.Lutris)$" --launch "flatpak run net.lutris.Lutris"
bind = $M4, o, exec, raise --match "class:regex=^org\\.pwmt\\.zathura$" --launch "zathura"
bind = $M4+$C, o, exec, raise --match "class:regex=^(obs|com\\.obsproject\\.Studio)$" --launch "obs"
bind = $M4+$C, n, exec, raise --match "class:regex=^(Obsidian|md\\.obsidian\\.Obsidian)$" --launch "flatpak run md.obsidian.Obsidian"
