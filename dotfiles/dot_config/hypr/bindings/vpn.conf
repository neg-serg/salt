# VPN / Proxy scratchpad group
# Trigger: Super + V  →  then h/a/f/n for each app
#
# Key map:
#   h  hiddify          (app.hiddify.com)
#   a  AmneziaVPN       (AmneziaVPN)
#   f  FlClashX/Mihomo  (com.follow.clashx)
#   n  v2rayN           (v2rayN)
# Future (not installed):
#   r  nekoray          (nekoray, Qt6)
#   m  mihomo-party     (mihomo-party, Electron)
#   c  clash-verge-rev  (clash-verge-rev, Tauri)

bind = $M4, v, submap, vpn

submap = vpn
binde = , h, exec, ~/.local/bin/scratchpad-toggle hiddify
binde = , h, submap, reset
binde = , a, exec, ~/.local/bin/scratchpad-toggle amnezia
binde = , a, submap, reset
binde = , f, exec, ~/.local/bin/scratchpad-toggle flclashx
binde = , f, submap, reset
binde = , n, exec, ~/.local/bin/scratchpad-toggle v2rayn
binde = , n, submap, reset
# binde = , r, exec, ~/.local/bin/scratchpad-toggle nekoray
# binde = , r, submap, reset
# binde = , m, exec, ~/.local/bin/scratchpad-toggle mihomo_party
# binde = , m, submap, reset
# binde = , c, exec, ~/.local/bin/scratchpad-toggle clash_verge
# binde = , c, submap, reset
source = ~/.config/hypr/bindings/_resets.conf
