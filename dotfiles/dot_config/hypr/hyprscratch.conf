daemon_options = spotless

im {
    command = Telegram
    class = org.telegram.desktop
    options = shiny
    rules = float on; size 7.5% 24%
}

music {
    command = kitty --single-instance --class music -e rmpc
    class = music
    rules = float on; size 1200 420
}

torrment {
    command = kitty --single-instance --class torrment -e rustmission
    class = torrment
    rules = float on; size 1440 420; move 19 0
}

teardown {
    command = kitty --single-instance --class teardown -e btop
    class = teardown
    options = shiny
    rules = float on; size 1440 460; move 19 0
}

mixer {
    command = kitty --single-instance --class mixer -e pipemixer
    class = mixer
    rules = float on; size 620 840; move 1280 32
}
