daemon_options = spotless

im {
    command = Telegram
    class = org.telegram.desktop
    options = shiny
    rules = float on; size 560 1020
}

music {
    command = kitty --single-instance --class music -e rmpc
    class = music
    rules = float on; size 1200 480
}

torrment {
    command = kitty --single-instance --class torrment -e rustmission
    class = torrment
    rules = float on; size 1880 480
}

teardown {
    command = kitty --single-instance --class teardown -e btop
    class = teardown
    options = shiny
    rules = float on; size 1880 560
}

mixer {
    command = kitty --single-instance --class mixer -e pipemixer
    class = mixer
    rules = float on; size 620 840
}

# --- VPN / Proxy ---

amnezia {
    command = /usr/local/bin/AmneziaVPN
    class = AmneziaVPN
    rules = float on; size 960 860
}

hiddify {
    command = hiddify
    class = app.hiddify.com
    options = shiny
    rules = float on; size 1100 780
}

flclashx {
    command = flclashx
    class = com.follow.clashx
    options = shiny
    rules = float on; size 1200 800
}

v2rayn {
    command = /opt/v2rayn-bin/v2rayN
    class = v2rayN
    rules = float on; size 1200 800
}

