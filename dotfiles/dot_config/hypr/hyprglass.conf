# HyprGlass — liquid glass effect for transparent windows
# Tuned for dark minimal aesthetic (no rounding, subtle effects)

plugin:hyprglass {
    enabled = 1
    default_theme = dark
    default_preset = default

    # Blur: complement existing decoration blur, not overpower it
    blur_strength = 1.8
    blur_iterations = 3

    # Subtle glass refraction and dispersion
    refraction_strength = 0.3
    chromatic_aberration = 0.2
    lens_distortion = 0.15

    # Edge and lighting: restrained to match minimal border style
    fresnel_strength = 0.3
    specular_strength = 0.4
    edge_thickness = 0.03
    glass_opacity = 0.95

    # Tint: dark blue to match $col_border_active_base
    tint_color = 0x00285918

    # Dark theme tone mapping
    dark:brightness = 0.85
    dark:contrast = 1.05
    dark:saturation = 0.9
    dark:adaptive_dim = 0.15
}
