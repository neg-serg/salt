# Managed by chezmoi from salt/dotfiles.
# Keep only stable user config here; auth and runtime state stay under ~/.codex.

model = "gpt-5.4"

[projects."/home/neg/src/salt"]
trust_level = "trusted"

[mcp_servers.serena]
command = "/usr/bin/uvx"
args = ["serena", "start-mcp-server", "--context", "claude-code", "--project", "/home/neg/src/salt"]

[mcp_servers.ollama]
command = "npx"
args = ["-y", "ollama-mcp-server"]

[mcp_servers.ollama.env]
OLLAMA_HOST = "http://localhost:11434"

[mcp_servers.arch-linux]
command = "/usr/bin/uvx"
args = ["arch-ops-server"]

[mcp_servers.neovim]
command = "npx"
args = ["-y", "mcp-neovim-server"]

[mcp_servers.neovim.env]
ALLOW_SHELL_COMMANDS = "true"
NVIM_SOCKET_PATH = "/tmp/nvim.sock"

[mcp_servers.spreadsheet]
command = "/home/neg/.local/share/cargo/bin/spreadsheet-mcp"
args = ["--transport", "stdio"]

[mcp_servers.ast-grep]
command = "/home/neg/.local/bin/ast-grep-server"

[mcp_servers.arxiv]
command = "/usr/bin/uvx"
args = ["arxiv-mcp-server", "--storage-path", "/home/neg/.arxiv-mcp-server/papers"]

[mcp_servers.qdrant]
command = "/usr/bin/uvx"
args = ["--python", "3.13", "mcp-server-qdrant"]

[mcp_servers.qdrant.env]
COLLECTION_NAME = "salt-project"
EMBEDDING_MODEL = "sentence-transformers/all-MiniLM-L6-v2"
QDRANT_URL = "http://127.0.0.1:6333"

[mcp_servers.code-rag]
command = "/home/neg/.local/share/pipx/venvs/code-rag/bin/python"
args = ["-m", "code_rag.server"]

[mcp_servers.ffmpeg]
command = "/usr/bin/uvx"
args = ["ffmpeg-mcp-lite"]

[mcp_servers.ffmpeg.env]
FFMPEG_OUTPUT_DIR = "/home/neg/vid"

[mcp_servers.blender]
command = "/usr/bin/uvx"
args = ["blender-mcp"]

[mcp_servers.nmap]
command = "podman"
args = ["run", "-i", "--rm", "--cap-add=NET_RAW", "nmap-mcp:latest"]

[mcp_servers.nuclei]
command = "podman"
args = ["run", "-i", "--rm", "nuclei-mcp:latest"]

[mcp_servers.semgrep]
command = "podman"
args = ["run", "-i", "--rm", "semgrep-mcp:latest"]

[mcp_servers.gitleaks]
command = "podman"
args = ["run", "-i", "--rm", "-v", "/home/neg/src:/app/target:ro", "gitleaks-mcp:latest"]

[mcp_servers.mpd]
command = "/home/neg/.local/bin/mpd-mcp-server"

[mcp_servers.hyprland]
command = "/home/neg/.local/bin/hyprland-mcp"

[mcp_servers.json-yaml-toml]
command = "/usr/bin/uvx"
args = ["mcp-json-yaml-toml"]

[mcp_servers.pandoc]
command = "/usr/bin/uvx"
args = ["mcp-pandoc"]

[mcp_servers.pdf]
command = "/usr/bin/uvx"
args = ["pdf-mcp"]

[mcp_servers.nettools]
command = "/home/neg/.local/bin/mcp-nettools"

[mcp_servers.text-toolkit]
command = "npx"
args = ["-y", "@cicatriz/text-toolkit@1.0.0"]

[mcp_servers.language-server]
command = "/home/neg/.local/bin/mcp-language-server"
args = ["--workspace", "/home/neg/src/salt", "--lsp", "lua-language-server"]

[mcp_servers.color-convert]
command = "npx"
args = ["-y", "mcp-color-convert@0.1.3"]

[mcp_servers.openapi]
command = "npx"
args = ["-y", "@reapi/mcp-openapi@0.0.4"]

[mcp_servers.wireshark]
command = "/usr/bin/uvx"
args = ["mcp-wireshark"]
